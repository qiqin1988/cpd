<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemantauan Kursus 40 Jam & MyCPD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-pulse-red { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .scale-in { animation: scaleIn 0.15s ease-out; }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .pie-chart { transform: rotate(-90deg); border-radius: 50%; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root">
        <div class="flex items-center justify-center min-h-screen p-8 bg-white">
            <div class="text-center">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-slate-500 font-bold text-sm uppercase tracking-widest">Menghubungkan Data Live...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ============================================================
        // TAMPAL URL WEB APP (/exec) TERBARU ANDA DI SINI
        // ============================================================
        const API_URL = "https://script.google.com/macros/s/AKfycbyZwzzPntM8dhMDKq7nGq9Qit9DfXYIWIEydNRdUwJwb9SSvqUWeLhHsaOu3LhDIXwJdQ/exec"; 

        const DEPARTMENTS = [
            { id: 'perubatan_am', name: 'JABATAN PERUBATAN AM' },
            { id: 'perubatan_respiratori', name: 'JABATAN PERUBATAN RESPIRATORI' },
            { id: 'kardiologi', name: 'JABATAN KARDIOLOGI' },
            { id: 'onkologi', name: 'JABATAN ONKOLOGI & RADIOTERAPI' },
            { id: 'phlebotomy', name: 'UNIT PHLEBOTOMY' },
            { id: 'psikiatri', name: 'JABATAN PSIKIATRI & KESIHATAN MENTAL' },
            { id: 'dermatologi', name: 'JABATAN DERMATOLOGI' },
            { id: 'pembedahan_am', name: 'JABATAN PEMBEDAHAN AM' },
            { id: 'ortopedik', name: 'JABATAN ORTOPEDIK' },
            { id: 'oftalmologi', name: 'JABATAN OFTALMOLOGI' },
            { id: 'ent', name: 'JABATAN OTORINOLARINGOLONGI ( ENT )' },
            { id: 'plastik', name: 'JABATAN PEMBEDAHAN PLASTIK & REKONSTRUKTIF' },
            { id: 'kardiothoraksik', name: 'JABATAN PEMBEDAHAN KARDIOTHORASIK' },
            { id: 'neurosurgery', name: 'JABATAN NEUROSURGERI' },
            { id: 'urologi', name: 'JABATAN UROLOGI' },
            { id: 'anestesi', name: 'JABATAN ANESTESIOLOGI & RAWATAN RAPI' },
            { id: 'kecemasan', name: 'JABATAN KECEMASAN' },
            { id: 'ong', name: 'JABATAN OBSTETRIK & GINEKOLOGI' },
            { id: 'pediatrik', name: 'JABATAN PEDIATRIK' },
            { id: 'pediatrik_kardio', name: 'JABATAN PEDIATRIK KARDIOLOGI' },
            { id: 'patologi', name: 'JABATAN PATOLOGI' },
            { id: 'radiologi', name: 'JABATAN RADIOLOGI' },
            { id: 'transfusi', name: 'JABATAN PERUBATAN TRANFUSI' },
            { id: 'forensik', name: 'JABATAN PERUBATAN FORENSIK' },
            { id: 'nuklear', name: 'JABATAN PERUBATAN NUKLEAR' },
            { id: 'farmasi', name: 'JABATAN FARMASI' },
            { id: 'dietetik', name: 'JABATAN DIETETIK & SAJIAN' },
            { id: 'kerja_sosial', name: 'JABATAN KERJA PERUBATAN SOSIAL' },
            { id: 'rekod', name: 'JABATAN REKOD PERUBATAN' },
            { id: 'rehabilitasi', name: 'JABATAN REHABILITASI' },
            { id: 'hr', name: 'SEKSYEN SUMBER MANUSIA' },
            { id: 'khidmat_pengurusan', name: 'SEKSYEN KHIDMAT PENGURUSAN' },
            { id: 'perolehan', name: 'SEKSYEN PEROLEHAN' },
            { id: 'kewangan', name: 'SEKSYEN KEWANGAN' },
            { id: 'pembangunan', name: 'SEKSYEN PEMBANGUNAN' },
            { id: 'keselamatan', name: 'UNIT KESELAMATAN' },
            { id: 'korporat', name: 'UNIT KOMUNIKASI KORPORAT' },
            { id: 'aset', name: 'UNIT PENGURUSAN ASET' },
            { id: 'perpustakaan', name: 'UNIT PERPUSTAKAAN' },
            { id: 'it', name: 'UNIT TEKNOLOGI MAKLUMAT' },
            { id: 'kejuruteraan', name: 'UNIT KEJURUTERAAN & OPERASI' },
            { id: 'kualiti', name: 'UNIT KUALITI' },
            { id: 'neurologi_unit', name: 'JABATAN NEUROLOGI' },
            { id: 'nefrologi', name: 'JABATAN NEFROLOGI' },
            { id: 'kluster', name: 'UNIT KLUSTER' },
            { id: 'crc', name: 'PUSAT PENYELIDIKAL KLINIKAL (CRC)' },
            { id: 'infeksi', name: 'UNIT KAWALAN INFEKSI' },
            { id: 'kejururawatan', name: 'UNIT KEJURURAWATAN' },
            { id: 'ppp', name: 'UNIT PENYELIA PPP' },
            { id: 'medicolegal', name: 'UNIT MEDICOLEGAL' },
            { id: 'osh', name: 'JABATAN PERUBATAN DAN KESIHATAN PEKERJAAN' },
            { id: 'pengarah', name: 'PEJABAT PENGARAH' },
            { id: 'islam', name: 'UNIT HAL EHWAL ISLAM' },
            { id: 'genetik', name: 'JABATAN GENETIK' },
            { id: 'jangkitan', name: 'UNIT KAWALAN PENYAKIT BERJANGKIT' },
            { id: 'rheumatologi', name: 'UNIT RHEUMATOLOGI' },
            { id: 'hematologi', name: 'UNIT HEMATOLOGI' },
            { id: 'endokrin', name: 'UNIT ENDOKRIN' },
            { id: 'gastro', name: 'UNIT GASTROENTEROLOGI & HEPATOLOGI' },
            { id: 'fisioterapi', name: 'UNIT FISIOTERAPI' },
            { id: 'carakerja', name: 'UNIT CARAKERJA' },
            { id: 'psikologi', name: 'UNIT PSIKOLOGI KAUNSELING' },
        ];

        const MONTHS = ['Januari', 'Februari', 'Mac', 'April', 'Mei', 'Jun', 'Julai', 'Ogos', 'September', 'Oktober', 'November', 'Disember'];

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                award: <path d="M12 15l-2 5l2 2l2-2l-2-5zm0-13a6 6 0 1 0 0 12a6 6 0 0 0 0-12zm0 10a4 4 0 1 1 0-8a4 4 0 0 1 0 8z"/>,
                plus: <path d="M12 5v14m-7-7h14"/>,
                refresh: <path d="M21 12a9 9 0 0 0-9-9a9.75 9.75 0 0 0-6.74 2.74L3 8m0 0V3m0 5h5m-5 4a9 9 0 0 0 9 9a9.75 9.75 0 0 0 6.74-2.74L21 16m0 0v5m0-5h-5"/>,
                trash: <g><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" stroke="currentColor" fill="none"/><line x1="10" y1="11" x2="10" y2="17" stroke="currentColor"/><line x1="14" y1="11" x2="14" y2="17" stroke="currentColor"/></g>,
                pencil: <g><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" fill="none"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" fill="none"/></g>,
                x: <g><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></g>,
                arrowLeft: <path d="M19 12H5m7-7l-7 7l7 7"/>,
                user: <g><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></g>,
                alert: <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></g>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [activeView, setActiveView] = useState('jabatan'); 
            const [selectedMonth, setSelectedMonth] = useState(MONTHS[new Date().getMonth()]);
            const [selectedDeptId, setSelectedDeptId] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [submissions, setSubmissions] = useState([]);
            const [masterList, setMasterList] = useState([]);
            const [loading, setLoading] = useState(true);
            const [fetchError, setFetchError] = useState(null);
            const [showAddStaff, setShowAddStaff] = useState(false);
            const [showEditStaff, setShowEditStaff] = useState(false);
            const [editingStaff, setEditingStaff] = useState({ oldName: '', newName: '', newDeptId: '' });

            const normalizeName = (n) => {
                if (!n) return "";
                return n.toString().toUpperCase().replace(/\bBT\.?\b/g, 'BINTI').replace(/\bB\.?\b/g, 'BIN').replace(/[^A-Z\s]/g, '').replace(/\s+/g, ' ').trim();
            };

            const normalizeMonth = (m) => {
                if (!m) return "";
                const val = m.toString().toLowerCase().trim();
                if (val.includes("jan")) return "Januari";
                if (val.includes("feb")) return "Februari";
                if (val.includes("mac") || val.includes("mar")) return "Mac";
                if (val.includes("apr")) return "April";
                if (val.includes("mei") || val.includes("may")) return "Mei";
                if (val.includes("jun")) return "Jun";
                if (val.includes("jul") || val.includes("july")) return "Julai";
                if (val.includes("ogo") || val.includes("aug")) return "Ogos";
                if (val.includes("sep")) return "September";
                if (val.includes("okt") || val.includes("oct")) return "Oktober";
                if (val.includes("nov")) return "November";
                if (val.includes("dis") || val.includes("dec")) return "Disember";
                return m;
            };

            const getFlexibleValue = (item, keywords) => {
                const keys = Object.keys(item);
                const targetKey = keys.find(k => {
                    const nk = k.toLowerCase().replace(/[^a-z0-9]/g, '');
                    return keywords.some(kw => nk.includes(kw.toLowerCase().replace(/[^a-z0-9]/g, '')));
                });
                return targetKey ? item[targetKey] : null;
            };

            const fetchData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(API_URL);
                    const result = await res.json();
                    
                    const formattedSubmissions = (result.submissions || []).map(item => ({
                        name: normalizeName(getFlexibleValue(item, ["NAMA", "PEGAWAI", "NAME"])),
                        deptName: (getFlexibleValue(item, ["JABATAN", "UNIT", "SEKSYEN", "DEPARTMENT"]) || "").toString().toUpperCase().trim(),
                        month: normalizeMonth(getFlexibleValue(item, ["BULAN", "MONTH"])),
                        hours: parseFloat(getFlexibleValue(item, ["JAM", "BERKURSUS", "HOURS"])) || 0,
                        cpd: parseFloat(getFlexibleValue(item, ["CPD", "MATA", "POINTS"])) || 0
                    }));

                    const formattedStaff = (result.staffList || []).map(item => ({
                        name: normalizeName(item["Nama"] || item["name"]),
                        deptId: item["JabatanID"] || item["deptId"]
                    }));

                    setSubmissions(formattedSubmissions);
                    setMasterList(formattedStaff);
                    setFetchError(null);
                } catch (e) {
                    setFetchError("Gagal menarik data.");
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { fetchData(); }, []);

            const complianceData = useMemo(() => {
                const data = DEPARTMENTS.map(dept => {
                    const namesInSheet = submissions.filter(s => s.deptName.includes(dept.name.toUpperCase()) || dept.name.toUpperCase().includes(s.deptName)).map(s => s.name);
                    const namesInMaster = masterList.filter(s => s.deptId === dept.id).map(s => s.name);
                    const allUnique = [...new Set([...namesInSheet, ...namesInMaster])];
                    const totalDenominator = allUnique.length;
                    const submittedInMonth = allUnique.filter(name => submissions.some(s => s.name === name && s.month === selectedMonth)).length;
                    const pct = totalDenominator > 0 ? Math.round((submittedInMonth / totalDenominator) * 100) : 0;
                    return { ...dept, count: submittedInMonth, total: totalDenominator, percentage: pct };
                }).sort((a,b) => b.percentage - a.percentage);

                if (activeView === 'jabatan' && !selectedDeptId && searchTerm) {
                    return data.filter(d => d.name.includes(searchTerm.toUpperCase()));
                }
                return data;
            }, [selectedMonth, submissions, masterList, activeView, selectedDeptId, searchTerm]);

            const staffData = useMemo(() => {
                const deptObj = DEPARTMENTS.find(d => d.id === selectedDeptId);
                const relevantNames = [...new Set([
                    ...submissions.filter(s => !selectedDeptId || s.deptName.includes(deptObj?.name || "")).map(s => s.name),
                    ...masterList.filter(m => !selectedDeptId || m.deptId === selectedDeptId).map(m => m.name)
                ])];

                return relevantNames.map(name => {
                    const subs = submissions.filter(s => s.name === name);
                    const master = masterList.find(s => s.name === name);
                    return {
                        name,
                        dept: master ? DEPARTMENTS.find(d => d.id === master.deptId)?.name : (subs[0]?.deptName || "UNIT LUAR"),
                        deptId: master ? master.deptId : '',
                        hasMonth: subs.some(s => s.month === selectedMonth),
                        totalHrs: subs.reduce((a,b) => a + b.hours, 0),
                        cpd: subs.reduce((a,b) => a + b.cpd, 0)
                    };
                })
                .filter(s => s.name.includes(searchTerm.toUpperCase()))
                .sort((a, b) => a.name.localeCompare(b.name)); 
            }, [selectedDeptId, selectedMonth, searchTerm, submissions, masterList]);

            const handleUpdate = async (e) => {
                e.preventDefault();
                setShowEditStaff(false);
                setLoading(true);
                try {
                    const response = await fetch(API_URL, { 
                        method: 'POST', 
                        body: JSON.stringify({ 
                            action: 'edit', 
                            oldName: editingStaff.oldName, 
                            newName: editingStaff.newName, 
                            newDeptId: editingStaff.newDeptId 
                        }),
                        headers: { 'Content-Type': 'text/plain' }
                    });
                    // Force refresh data
                    setTimeout(fetchData, 1000); 
                } catch (err) { alert("Gagal kemaskini."); setLoading(false); }
            };

            const handleDelete = async (name) => {
                if(!confirm(`Padam ${name}?`)) return;
                setLoading(true);
                try {
                    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', name }), headers: { 'Content-Type': 'text/plain' } });
                    setTimeout(fetchData, 1000);
                } catch (err) { alert("Gagal padam."); setLoading(false); }
            };

            const handleAdd = async (e) => {
                e.preventDefault();
                const name = normalizeName(e.target.name.value);
                const deptId = e.target.deptId.value;
                setShowAddStaff(false);
                setLoading(true);
                try {
                    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'add', name, deptId }), headers: { 'Content-Type': 'text/plain' } });
                    setTimeout(fetchData, 1000);
                } catch (e) { alert("Gagal tambah."); setLoading(false); }
            };

            return (
                <div className="min-h-screen pb-10">
                    <header className="bg-white border-b sticky top-0 z-30 p-3 shadow-sm">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-2">
                                <div className="bg-blue-700 p-2 rounded-lg text-white shadow-lg"><Icon name="award" /></div>
                                <div><h1 className="text-sm font-black uppercase">40J & MyCPD LIVE</h1><p className="text-[7px] text-slate-400 font-bold uppercase tracking-widest mt-1">Sistem v5.3 Refreshed</p></div>
                            </div>
                            <div className="flex bg-slate-100 p-1 rounded-lg scale-90 border">
                                <button onClick={() => {setActiveView('jabatan'); setSelectedDeptId(null); setSearchTerm('');}} className={`px-6 py-1.5 rounded-md text-[10px] font-bold transition-all ${activeView === 'jabatan' && !selectedDeptId ? 'bg-white shadow text-blue-700' : 'text-slate-500'}`}>Jabatan</button>
                                <button onClick={() => {setActiveView('individu'); setSelectedDeptId(null); setSearchTerm('');}} className={`px-6 py-1.5 rounded-md text-[10px] font-bold transition-all ${activeView === 'individu' || selectedDeptId ? 'bg-white shadow text-blue-700' : 'text-slate-500'}`}>Individu</button>
                            </div>
                            <div className="flex items-center gap-2 scale-90">
                                <button onClick={() => setShowAddStaff(true)} className="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-[9px] font-black uppercase flex items-center gap-1 shadow-md active:scale-95 transition-all"><Icon name="plus"/> Tambah Pegawai</button>
                                <button onClick={fetchData} className="p-1.5 bg-white border rounded-lg active:scale-95 transition-all shadow-sm"><Icon name="refresh" className={loading ? "animate-spin" : ""}/></button>
                                <select value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="bg-white border rounded-lg text-[9px] font-bold p-1.5 outline-none">{MONTHS.map(m => <option key={m} value={m}>{m}</option>)}</select>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-6">
                        {fetchError && <div className="mb-4 p-3 bg-red-50 text-red-700 text-xs font-bold rounded-xl flex items-center gap-2 animate-pulse shadow-sm border border-red-100"><Icon name="alert" /> {fetchError}</div>}
                        
                        <div className="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div className="flex items-center gap-2">
                                {selectedDeptId && <button onClick={() => {setSelectedDeptId(null); setSearchTerm('');}} className="p-1.5 bg-white border rounded-full hover:bg-slate-50 transition-all shadow-sm"><Icon name="arrowLeft"/></button>}
                                <h2 className="text-sm font-black uppercase text-slate-700">{selectedDeptId ? DEPARTMENTS.find(d => d.id === selectedDeptId).name : (activeView === 'jabatan' ? 'Cari Jabatan' : 'Cari Nama Pegawai')}</h2>
                            </div>
                            <div className="w-full md:w-80"><input type="text" placeholder="Taip nama di sini..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full border-2 border-slate-200 rounded-xl px-4 py-2 text-[11px] outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 uppercase font-bold transition-all shadow-sm" /></div>
                        </div>

                        {activeView === 'jabatan' && !selectedDeptId ? (
                            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-2 animate-in fade-in duration-500">
                                {complianceData.map(dept => (
                                    <button key={dept.id} onClick={() => {setSelectedDeptId(dept.id); setSearchTerm('');}} className="text-left p-2.5 rounded-xl border bg-white hover:border-blue-400 transition-all group shadow-sm flex flex-col justify-between h-[90px]">
                                        <h4 className="font-bold text-[9px] mb-1.5 h-6 line-clamp-2 uppercase leading-tight text-slate-600 group-hover:text-blue-700">{dept.name}</h4>
                                        <div className="flex justify-between items-end">
                                            <div className="flex-1 mr-2"><p className="text-[8px] font-black text-blue-600 uppercase mb-0.5">{dept.count}/{dept.total}</p><div className="w-full bg-slate-100 h-1 rounded-full overflow-hidden"><div className="bg-blue-600 h-full transition-all duration-700" style={{width: `${dept.percentage}%`}}></div></div></div>
                                            <span className="text-[10px] font-black text-slate-700 ml-1">{dept.percentage}%</span>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm overflow-x-auto">
                                <table className="w-full text-left text-[10px]">
                                    <thead className="bg-slate-50 border-b">
                                        <tr><th className="px-4 py-2 font-bold uppercase text-slate-500">Pegawai</th><th className="px-4 py-2 font-bold uppercase text-center text-slate-500">Status {selectedMonth}</th><th className="px-4 py-2 font-bold uppercase text-center text-slate-500">Jam</th><th className="px-4 py-2 font-bold uppercase text-center text-slate-500">CPD</th><th className="px-4 py-2 font-bold uppercase text-center text-slate-500">Aksi</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {staffData.length > 0 ? staffData.map((s, i) => (
                                            <tr key={i} className={!s.hasMonth ? 'bg-red-50/20' : 'hover:bg-slate-50 transition-colors'}>
                                                <td className="px-4 py-3"><div className="flex items-center gap-2"><Icon name="user" className="text-slate-300 w-5 h-5"/><div><p className={`font-bold ${!s.hasMonth ? 'text-red-700' : 'text-slate-800'}`}>{s.name}</p><p className="text-[8px] text-blue-500 font-bold uppercase">{s.dept}</p></div></div></td>
                                                <td className="px-4 py-3 text-center"><span className={`px-2 py-0.5 rounded-full text-[8px] font-black uppercase ${s.hasMonth ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>{s.hasMonth ? 'Selesai' : 'Belum'}</span></td>
                                                <td className="px-4 py-3 text-center font-bold text-blue-700">{s.totalHrs}</td>
                                                <td className="px-4 py-3 text-center font-bold text-amber-600">{s.cpd}</td>
                                                <td className="px-4 py-3 text-center">
                                                    <div className="flex items-center justify-center gap-2">
                                                        <button onClick={() => { setEditingStaff({ oldName: s.name, newName: s.name, newDeptId: s.deptId }); setShowEditStaff(true); }} className="p-1.5 bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white rounded-lg transition-all border border-blue-100 shadow-sm" title="Edit Pegawai"><Icon name="pencil" className="w-3.5 h-3.5" /></button>
                                                        <button onClick={() => handleDelete(s.name)} className="p-1.5 bg-red-50 text-red-600 hover:bg-red-600 hover:text-white rounded-lg transition-all border border-red-100 shadow-sm" title="Padam Pegawai"><Icon name="trash" className="w-3.5 h-3.5" /></button>
                                                    </div>
                                                </td>
                                            </tr>
                                        )) : (
                                            <tr><td colSpan="5" className="py-10 text-center text-slate-400 font-bold uppercase text-[10px]">Tiada data pegawai ditemui.</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>

                    {/* MODAL TAMBAH */}
                    {showAddStaff && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 transition-all">
